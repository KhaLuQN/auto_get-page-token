<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lấy Page Access Token</title>
<style>
 @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

 *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

 :root {
 --bg: #0f1117;
 --surface: #181c27;
 --surface2: #1e2335;
 --border: rgba(255,255,255,0.07);
 --border-focus: rgba(99,179,255,0.5);
 --text: #e8ecf4;
 --muted: #7a8499;
 --accent: #4a9eff;
 --accent-glow: rgba(74,158,255,0.15);
 --success: #34d399;
 --success-bg: rgba(52,211,153,0.1);
 --error: #f87171;
 --error-bg: rgba(248,113,113,0.1);
 --warning: #fbbf24;
 }

 body {
 font-family: 'Be Vietnam Pro', sans-serif;
 background: var(--bg);
 color: var(--text);
 min-height: 100vh;
 display: flex;
 align-items: center;
 justify-content: center;
 padding: 2rem 1rem;
 }

 .bg-grid {
 position: fixed; inset: 0; pointer-events: none; z-index: 0;
 background-image:
 linear-gradient(rgba(74,158,255,0.03) 1px, transparent 1px),
 linear-gradient(90deg, rgba(74,158,255,0.03) 1px, transparent 1px);
 background-size: 40px 40px;
 }
 .bg-blob {
 position: fixed; top: -20%; left: 50%; transform: translateX(-50%);
 width: 700px; height: 400px; border-radius: 50%;
 background: radial-gradient(ellipse, rgba(74,158,255,0.06) 0%, transparent 70%);
 pointer-events: none; z-index: 0;
 }

 .card {
 position: relative; z-index: 1;
 background: var(--surface);
 border: 1px solid var(--border);
 border-radius: 20px;
 padding: 2.5rem;
 width: 100%;
 max-width: 500px;
 box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 32px 64px rgba(0,0,0,0.5);
 }

 .badge {
 display: inline-flex; align-items: center; gap: 6px;
 background: var(--accent-glow);
 border: 1px solid rgba(74,158,255,0.25);
 color: var(--accent);
 font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
 text-transform: uppercase;
 padding: 4px 10px; border-radius: 100px;
 margin-bottom: 1.25rem;
 }
 .badge::before {
 content: ''; width: 6px; height: 6px;
 background: var(--accent); border-radius: 50%;
 animation: pulse 2s infinite;
 }
 @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

 h1 { font-size: 1.5rem; font-weight: 600; line-height: 1.3; margin-bottom: 0.5rem; }
 .desc {
 font-size: 0.85rem; color: var(--muted); line-height: 1.6;
 margin-bottom: 2rem; padding-bottom: 1.5rem;
 border-bottom: 1px solid var(--border);
 }

 .field { margin-bottom: 1.25rem; }
 label {
 display: block;
 font-size: 0.8rem; font-weight: 600; color: var(--muted);
 text-transform: uppercase; letter-spacing: 0.06em;
 margin-bottom: 0.5rem;
 }
 label .required { color: var(--error); margin-left: 2px; }

 .input-wrap { position: relative; }
 input {
 width: 100%; font-family: 'JetBrains Mono', monospace; font-size: 0.88rem;
 background: var(--surface2); color: var(--text);
 border: 1px solid var(--border);
 border-radius: 10px; padding: 0.75rem 2.75rem 0.75rem 1rem;
 transition: border-color 0.2s, box-shadow 0.2s;
 outline: none; -webkit-appearance: none;
 }
 input:focus {
 border-color: var(--border-focus);
 box-shadow: 0 0 0 3px var(--accent-glow);
 }
 input.error-field { border-color: rgba(248,113,113,0.5); }
 input::placeholder { color: var(--muted); font-size: 0.82rem; }

 .toggle-vis {
 position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
 background: none; border: none; cursor: pointer;
 color: var(--muted); padding: 4px; display: flex;
 transition: color 0.2s;
 }
 .toggle-vis:hover { color: var(--text); }

 .hint { font-size: 0.75rem; color: var(--muted); margin-top: 5px; display: flex; align-items: flex-start; gap: 5px; }
 .hint.warn { color: var(--warning); }
 .hint svg { flex-shrink: 0; margin-top: 1px; }

 .btn {
 width: 100%; margin-top: 1.75rem;
 background: var(--accent); color: #fff;
 font-family: 'Be Vietnam Pro', sans-serif;
 font-size: 0.95rem; font-weight: 600;
 border: none; border-radius: 10px;
 padding: 0.9rem 1.5rem; cursor: pointer;
 transition: all 0.2s;
 display: flex; align-items: center; justify-content: center; gap: 8px;
 }
 .btn:hover:not(:disabled) {
 background: #6ab2ff; transform: translateY(-1px);
 box-shadow: 0 8px 24px rgba(74,158,255,0.3);
 }
 .btn:active:not(:disabled) { transform: translateY(0); }
 .btn:disabled { opacity: 0.5; cursor: not-allowed; }

 .spinner {
 width: 16px; height: 16px;
 border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
 border-radius: 50%; animation: spin 0.6s linear infinite; display: none;
 }
 @keyframes spin { to { transform: rotate(360deg); } }

 .alert {
 display: none; border-radius: 10px; padding: 1rem 1.25rem;
 font-size: 0.85rem; margin-top: 1rem; border: 1px solid transparent; line-height: 1.5;
 }
 .alert.success { background: var(--success-bg); border-color: rgba(52,211,153,0.25); color: var(--success); }
 .alert.error-box { background: var(--error-bg); border-color: rgba(248,113,113,0.25); color: var(--error); }

 .security-note {
 margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border);
 display: flex; align-items: flex-start; gap: 8px;
 font-size: 0.75rem; color: var(--muted); line-height: 1.5;
 }
 .security-note svg { flex-shrink: 0; margin-top: 1px; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-blob"></div>

<div class="card">
 <div class="badge">Automation Tool</div>
 <h1>Lấy Page Access Token</h1>
 <p class="desc">Nhập thông tin Facebook App của bạn. Hệ thống sẽ tự động lấy Page ID, Page Name và Page Access Token dài hạn cho tất cả các page.</p>

 <div class="field">
 <label>User Token <span class="required">*</span></label>
 <div class="input-wrap">
 <input type="password" id="user_token" placeholder="EAAxxxxxxxxxx..." autocomplete="off" />
 <button class="toggle-vis" type="button" onclick="toggleVis('user_token', this)">
 <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
 </button>
 </div>
 <p class="hint warn">
 <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
 Chỉ dùng User Token tạm thời, không phải password.
 </p>
 </div>

 <div class="field">
 <label>App ID</label>
 <div class="input-wrap">
 <input type="text" id="app_id" placeholder="123456789012345" autocomplete="off" />
 </div>
 </div>

 <div class="field">
 <label>App Secret</label>
 <div class="input-wrap">
 <input type="password" id="app_secret" placeholder="abc123def456..." autocomplete="off" />
 <button class="toggle-vis" type="button" onclick="toggleVis('app_secret', this)">
 <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
 </button>
 </div>
 </div>

 <button class="btn" id="submitBtn" onclick="submitForm()">
 <span id="btnText">Lấy Token</span>
 <div class="spinner" id="spinner"></div>
 <svg id="btnIcon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
 </button>

 <div class="alert" id="alertBox"></div>

 <div class="security-note">
 <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
 Dữ liệu được gửi qua HTTPS. Không lưu trữ credential sau khi xử lý.
 </div>
</div>

<script>
 const N8N_URL = 'https://fb.alphagym.site/webhook/get-page-token';

 function toggleVis(id, btn) {
 const input = document.getElementById(id);
 const isPass = input.type === 'password';
 input.type = isPass ? 'text' : 'password';
 btn.innerHTML = isPass
 ? '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
 : '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
 }

 function setLoading(on) {
 document.getElementById('submitBtn').disabled = on;
 document.getElementById('spinner').style.display = on ? 'block' : 'none';
 document.getElementById('btnIcon').style.display = on ? 'none' : 'block';
 document.getElementById('btnText').textContent = on ? 'Đang xử lý...' : 'Lấy Token';
 }

 function showAlert(type, message) {
 const box = document.getElementById('alertBox');
 box.className = 'alert ' + (type === 'success' ? 'success' : 'error-box');
 box.textContent = message;
 box.style.display = 'block';
 box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
 }

 async function submitForm() {
 const user_token = document.getElementById('user_token').value.trim();
 const app_id = document.getElementById('app_id').value.trim();
 const app_secret = document.getElementById('app_secret').value.trim();

 document.getElementById('alertBox').style.display = 'none';
 ['user_token','app_id','app_secret'].forEach(id =>
 document.getElementById(id).classList.remove('error-field')
 );

 if (!user_token) {
 document.getElementById('user_token').classList.add('error-field');
 showAlert('error', 'Vui lòng nhập User Token.');
 return;
 }

 setLoading(true);
 try {
 const res = await fetch(N8N_URL, {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({ user_token, app_id, app_secret })
 });

 if (res.ok) {
 showAlert('success', '✓ Gửi thành công! Workflow đang xử lý. Kiểm tra kết quả trong Google Sheet của bạn.');
 document.getElementById('user_token').value = '';
 document.getElementById('app_id').value = '';
 document.getElementById('app_secret').value = '';
 } else {
 showAlert('error', `Lỗi từ server: ${res.status}. Kiểm tra lại workflow n8n.`);
 }
 } catch (err) {
 showAlert('error', 'Không thể kết nối tới server. Kiểm tra n8n đang chạy và CORS đã được bật.');
 }
 setLoading(false);
 }

 document.addEventListener('keydown', e => { if (e.key === 'Enter') submitForm(); });
</script>
</body>
</html>
